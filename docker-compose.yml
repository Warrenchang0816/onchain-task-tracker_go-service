services:
  # 資料庫服務
  postgres:
    image: postgres:15-alpine
    container_name: onchain-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
      POSTGRES_DB: TASK
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d TASK"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 快取服務
  redis:
    image: redis:7-alpine
    container_name: onchain-redis
    restart: always
    ports:
      - "6379:6379"

  # Go 後端服務
  go-service:
    build: .
    image: go-service:1.0.0
    container_name: go-service
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      APP_PORT: "8080"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASS: "123"
      DB_NAME: "TASK"
      DB_SSLMODE: "disable"
      APP_CHAIN_ID: ${APP_CHAIN_ID:-11155111}
      APP_RPC_URL: ${APP_RPC_URL:-}
      APP_REWARD_VAULT_ADDRESS: ${APP_REWARD_VAULT_ADDRESS:-}
      APP_PLATFORM_FEE_BPS: ${APP_PLATFORM_FEE_BPS:-500}
      APP_GOD_MODE_WALLET_ADDRESS: ${APP_GOD_MODE_WALLET_ADDRESS:-}
      APP_PLATFORM_TREASURY_ADDRESS: ${APP_PLATFORM_TREASURY_ADDRESS:-}
      APP_PLATFORM_OPERATOR_PRIVATE_KEY: ${APP_PLATFORM_OPERATOR_PRIVATE_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
