name: green-food-go-service
services:
  # 資料庫服務


  # 快取服務


  # Go 後端服務
  green-food-go-service:
    build: .
    image: green-food-go-service:1.0.0
    container_name: green-food-go-service
    restart: unless-stopped
    ports:
      - "8082:8080"
    env_file:
      - green_food.env
    environment:
      APP_PORT: "8080"
      DB_HOST: "host.docker.internal"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASS: ${DB_PASS}
      DB_NAME: "GREEN_FOOD"
      DB_SSLMODE: "disable"
      APP_CHAIN_ID: ${APP_CHAIN_ID:-11155111}
      APP_RPC_URL: ${APP_RPC_URL:-}
      APP_REWARD_VAULT_ADDRESS: ${APP_REWARD_VAULT_ADDRESS:-}
      APP_PLATFORM_FEE_BPS: ${APP_PLATFORM_FEE_BPS:-500}
      APP_GOD_MODE_WALLET_ADDRESS: ${APP_GOD_MODE_WALLET_ADDRESS:-}
      APP_PLATFORM_TREASURY_ADDRESS: ${APP_PLATFORM_TREASURY_ADDRESS:-}
      APP_PLATFORM_OPERATOR_PRIVATE_KEY: ${APP_PLATFORM_OPERATOR_PRIVATE_KEY:-}

